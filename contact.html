<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>evoshifting | Contact</title>
  
  <style>
    /* =========================================
       1. VARIABLES ET TYPOGRAPHIE
       ========================================= */
    :root {
      --primary: #111111;
      --accent: #68A67A;
      --bg: #ffffff;
      --text: #333333;
      --border: #eaeaea;
    }
    
    * {
      box-sizing: border-box;
      font-family: "Futura PT", "Futura", "Trebuchet MS", sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* =========================================
       2. LE HEADER (IDENTIQUE PARTOUT)
       ========================================= */
    .site-header {
      background-color: #ffffff;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 1000;
      padding: 15px 0;
    }
    
    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-logo img {
      height: 40px; 
      width: auto;
      display: block;
    }

    .header-nav {
      display: flex;
      gap: 30px;
      align-items: center;
    }

    .header-nav a {
      text-decoration: none;
      color: var(--primary);
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: color 0.2s ease;
    }

    .header-nav a:hover, 
    .header-nav a.active {
      color: var(--accent);
    }

    /* =========================================
       3. CONTENU SPECIFIQUE A LA PAGE (CONTACT)
       ========================================= */
    .main-content {
      flex: 1;
      max-width: 1000px;
      margin: 0 auto;
      padding: 60px 20px;
      width: 100%;
    }

    .contact-layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 50px;
    }

    .contact-info h1 {
      font-size: 2rem;
      margin-top: 0;
      color: var(--primary);
    }

    .contact-info p {
      line-height: 1.6;
      color: var(--text);
    }

    .form-group {
      margin-bottom: 25px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-group input, 
    .form-group textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 16px;
      transition: border-color 0.2s;
    }

    .form-group input:focus, 
    .form-group textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
